name: Booking Cron Jobs

on:
  schedule:
    # Run daily at 9:00 AM Pacific (4:00 PM UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    name: Send Reminder Emails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./booking-cron
        run: npm ci

      - name: Send reminder emails
        working-directory: ./booking-cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BASE_URL: https://con-vive.com
          NODE_ENV: production
        run: npm run send-reminders

  send-post-dinner:
    name: Send Post-Dinner Emails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./booking-cron
        run: npm ci

      - name: Send post-dinner emails
        working-directory: ./booking-cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NODE_ENV: production
        run: npm run send-post-dinner
